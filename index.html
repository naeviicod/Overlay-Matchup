<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Overlay Widget</title>
<style>
/* Overlay styles */
#overlay {
  width: 1800px;
  height: 450px;
  padding: 20px;
  background: #0a0f2c;
  color: white;
  font-family: 'Montserrat', sans-serif;
  text-transform: uppercase;
  pointer-events: none;
  user-select: none;
  margin: 0 auto;
  overflow: hidden;
  position: relative;
  border-radius: 20px;
  box-shadow: 12px 12px 25px rgba(0,0,0,0.45);
}
.subtitle { text-align: center; font-size: 50px; margin-top: 1px; font-weight: 900; color: #8a5cff; }
.purple-line { border-top: 2px solid #8a5cff; margin: 5px 0 10px 0; }
.team-display { text-align: center; font-weight: 900; font-size: 32px; margin-bottom: 15px; }
.maps-horizontal { display: flex; justify-content: space-between; gap: 20px; }
.map-container { width: 18%; display: flex; flex-direction: column; align-items: center; }
.map { width: 100%; height: 275px; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); position: relative; overflow: hidden; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
.map-title { text-align: center; margin-bottom: 10px; }
.map-number { font-size: 17px; font-weight: 900; margin-top: -10px; color: #8a5cff; }
.map-mode { font-size: 20px; margin-top: 5px; font-weight: 900; }
.map-img { width: 100%; height: 180px; object-fit: cover; object-position: center 20%; display: none; border-radius: 8px; margin-top: 0px; }
#mapImg2 { object-position: center 40%; }
.map-label { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(15,20,50,0.95); padding: 6px 16px; border-radius: 6px; font-size: 14px; font-weight: 700; color: #8a5cff; display: none; margin-bottom: -5px; }
.live-indicator { position: absolute; top: 10px; right: 10px; background: #8a5cff; padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; display: none; }
.map-controls { margin-top: 25px; display: flex; flex-direction: column; gap: 5px; }
.map-controls select, .map-controls button, .team-inputs-bottom input, .team-inputs-bottom button { padding: 6px 10px; border-radius: 6px; border: 1px solid rgba(138,92,255,0.7); background: #0a0f2c; color: white; font-weight: bold; cursor: pointer; pointer-events: auto; }
.team-inputs-bottom { margin-top: 25px; display: flex; justify-content: center; gap: 10px; }
#adminToggle { position: absolute; top: 680px; left: 50%; transform: translateX(-50%); padding: 8px 16px; font-size: 14px; background: #8a5cff; color: white; border-radius: 8px; margin-bottom: 10px; cursor: pointer; z-index: 9999; }
.admin-hidden .map-controls, .admin-hidden .team-inputs-bottom { display: none; }
</style>
</head>
<body>

<div id="overlay">
  <div class="subtitle">TODAY'S MATCHUP</div>
  <div class="purple-line"></div>
  <div class="team-display" id="teamDisplay">TEAM A vs TEAM B</div>

  <div class="maps-horizontal">
    <!-- MAP 1 -->
    <div class="map-container">
      <div class="map" id="map1">
        <div class="map-title"><div class="map-number">MAP 1</div><div class="map-mode">HARDPOINT</div></div>
        <img class="map-img" id="mapImg1">
        <div class="map-label" id="label1"></div>
        <div class="live-indicator">LIVE</div>
      </div>
      <div class="map-controls">
        <select onchange="updateMap(1,this.value)">
          <option value="">Select Map</option>
          <option>Blackheart</option>
          <option>Colossus</option>
          <option>Den</option>
          <option>Exposure</option>
          <option>Raid</option>
          <option>Scar</option>
        </select>
        <button onclick="toggleLive(1)">LIVE</button>
      </div>
    </div>

    <!-- MAPS 2-5 (same structure, just change ids) -->
    <div class="map-container">
      <div class="map" id="map2">
        <div class="map-title"><div class="map-number">MAP 2</div><div class="map-mode">SEARCH & DESTROY</div></div>
        <img class="map-img" id="mapImg2">
        <div class="map-label" id="label2"></div>
        <div class="live-indicator">LIVE</div>
      </div>
      <div class="map-controls">
        <select onchange="updateMap(2,this.value)">
          <option value="">Select Map</option>
          <option>Blackheart</option>
          <option>Colossus</option>
          <option>Den</option>
          <option>Exposure</option>
          <option>Raid</option>
          <option>Scar</option>
        </select>
        <button onclick="toggleLive(2)">LIVE</button>
      </div>
    </div>

    <div class="map-container">
      <div class="map" id="map3">
        <div class="map-title"><div class="map-number">MAP 3</div><div class="map-mode">OVERLOAD</div></div>
        <img class="map-img" id="mapImg3">
        <div class="map-label" id="label3"></div>
        <div class="live-indicator">LIVE</div>
      </div>
      <div class="map-controls">
        <select onchange="updateMap(3,this.value)">
          <option value="">Select Map</option>
          <option>Blackheart</option>
          <option>Colossus</option>
          <option>Den</option>
          <option>Exposure</option>
          <option>Raid</option>
          <option>Scar</option>
        </select>
        <button onclick="toggleLive(3)">LIVE</button>
      </div>
    </div>

    <div class="map-container">
      <div class="map" id="map4">
        <div class="map-title"><div class="map-number">MAP 4</div><div class="map-mode">HARDPOINT</div></div>
        <img class="map-img" id="mapImg4">
        <div class="map-label" id="label4"></div>
        <div class="live-indicator">LIVE</div>
      </div>
      <div class="map-controls">
        <select onchange="updateMap(4,this.value)">
          <option value="">Select Map</option>
          <option>Blackheart</option>
          <option>Colossus</option>
          <option>Den</option>
          <option>Exposure</option>
          <option>Raid</option>
          <option>Scar</option>
        </select>
        <button onclick="toggleLive(4)">LIVE</button>
      </div>
    </div>

    <div class="map-container">
      <div class="map" id="map5">
        <div class="map-title"><div class="map-number">MAP 5</div><div class="map-mode">SEARCH & DESTROY</div></div>
        <img class="map-img" id="mapImg5">
        <div class="map-label" id="label5"></div>
        <div class="live-indicator">LIVE</div>
      </div>
      <div class="map-controls">
        <select onchange="updateMap(5,this.value)">
          <option value="">Select Map</option>
          <option>Blackheart</option>
          <option>Colossus</option>
          <option>Den</option>
          <option>Exposure</option>
          <option>Raid</option>
          <option>Scar</option>
        </select>
        <button onclick="toggleLive(5)">LIVE</button>
      </div>
    </div>
  </div>

  <div class="team-inputs-bottom">
    <input id="teamAInput" placeholder="Team A">
    <input id="teamBInput" placeholder="Team B">
    <button onclick="updateTeams()">Set Teams</button>
  </div>

</div>

<button id="adminToggle" onclick="toggleAdmin()">ADMIN</button>

<script>
// Map images from GitHub
<script>
const mapImages = {
  "Blackheart":"https://naeviicod.github.io/Overlay-Matchup/images/Blackheart.jpg",
  "Colossus":"https://naeviicod.github.io/Overlay-Matchup/images/Colossus.jpg",
  "Den":"https://naeviicod.github.io/Overlay-Matchup/images/Den.jpg",
  "Exposure":"https://naeviicod.github.io/Overlay-Matchup/images/Exposure.jpg",
  "Raid":"https://naeviicod.github.io/Overlay-Matchup/images/Raid.jpg",
  "Scar":"https://naeviicod.github.io/Overlay-Matchup/images/Scar.jpg"
};

function updateMap(num, mapName) {
  const img = document.getElementById("mapImg"+num);
  const label = document.getElementById("label"+num);
  if(mapName && mapImages[mapName]){
    img.src = mapImages[mapName];
    img.style.display = "block";
    label.innerText = mapName;
    label.style.display = "block";
  } else {
    img.style.display = "none";
    label.style.display = "none";
  }
}
const cloudJSON = "https://naeviicod.github.io/Overlay-Matchup/overlay.json";
  
function toggleLive(num){
  const live = document.querySelector("#map"+num+" .live-indicator");
  live.style.display = (live.style.display === "none") ? "block" : "none";
}

function updateTeams(){
  const a = document.getElementById("teamAInput").value || "TEAM A";
  const b = document.getElementById("teamBInput").value || "TEAM B";
  document.getElementById("teamDisplay").innerText = `${a} vs ${b}`;
}

function toggleAdmin(){
  document.getElementById("overlay").classList.toggle("admin-hidden");
}

async function fetchOverlayData() {
  try {
    const timestamp = new Date().getTime(); // cache-busting
    const res = await fetch(`${cloudJSON}?t=${timestamp}`);
    const data = await res.json();

    document.getElementById("teamDisplay").innerText = `${data.teams.teamA} vs ${data.teams.teamB}`;

    for (let i = 1; i <= 5; i++) {
      const mapSlot = data.maps[i];
      const img = document.getElementById(`mapImg${i}`);
      const label = document.getElementById(`label${i}`);
      const live = document.querySelector(`#map${i} .live-indicator`);

      if (mapSlot && data.mapImages[mapSlot.name]) {
        img.src = data.mapImages[mapSlot.name] + `?t=${timestamp}`;
        img.style.display = "block";
        label.innerText = mapSlot.name;
        label.style.display = "block";
        live.style.display = mapSlot.live ? "block" : "none";
      } else {
        img.style.display = "none";
        label.style.display = "none";
        live.style.display = "none";
      }
    }
  } catch(e) {
    console.error("Error fetching overlay JSON:", e);
  }
}

fetchOverlayData();
setInterval(fetchOverlayData, 5000);
</script>
</body>
</html>
